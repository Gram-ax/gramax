# Trivy secret scanner configuration
# All rules below suppress false positives from build artifacts.
# Bundled/minified JS files contain placeholder strings (e.g. "**************************")
# that match secret patterns but are not real secrets.

allow-rules:
  - id: allow-bundled-browser
    description: Build artifact - browser app bundle
    path: "apps/browser/dist/.*"

  - id: allow-bundled-cli-build
    description: Build artifact - CLI build output
    path: "apps/gramax-cli/build/.*"

  - id: allow-bundled-cli-dist
    description: Build artifact - CLI dist output
    path: "apps/gramax-cli/dist/.*"

  - id: allow-bundled-next
    description: Build artifact - Next.js build output
    path: "apps/next/\\.next/.*"

  - id: allow-bundled-tauri
    description: Build artifact - Tauri app bundle
    path: "apps/tauri/dist/.*"

  - id: allow-bundled-root-dist
    description: Build artifact - root dist output
    path: "dist/.*"
