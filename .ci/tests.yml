tests:
  extends: .template.tests-enterprise
  script:
    - bun run tsc --incremental false
    - bun run test:unit
    - bun run test:int
    - bun run test:ges

web-e2e-pw:
  extends: .template.e2e-pw
  script:
    - |
      nice -n 15 ionice -c 3 bun run --cwd e2e-pw web:build
      bun run --cwd e2e-pw web:start &
    - nice -n -15 bun run --cwd e2e-pw web:ci

