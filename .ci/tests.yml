################ TEMPLATES ################

.template.e2e-pw:
  stage: test
  interruptible: true
  tags:
    - kubernetes01-gramax-5ghz
  image: gitlab.ics-it.ru:4567/ics/doc-reader/playwright:$USE_IMAGE_TAG
  rules:
    - !reference [.rules, tests, base]
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - !reference [.rules, core]
  variables:
    PRODUCTION: "false"
    GX_E2E_GITLAB_PUSH_REPO: test-push-$CI_COMMIT_SHORT_SHA
    KUBERNETES_MEMORY_REQUEST: "4Gi"
    KUBERNETES_CPU_REQUEST: "1.8"
    KUBERNETES_CPU_LIMIT: "5"
    CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  artifacts:
    when: on_failure
    expire_in: "2 days"
    paths:
      - e2e-pw/report
  before_script:
    - !reference [.template.github-ssh-key, before_script]
    - ./install-deps.sh --ci
    - ./.ci/e2e/repo-info.sh

.template.enterprise:
  variables:
    NODE_TLS_REJECT_UNAUTHORIZED: 0
    ENTERPRISE_STORAGE_TYPE: local
    GIT_SERVER_TOKEN: $ENTERPRISE_GIT_SERVER_TOKEN
    GIT_PROJECT_PATH: $ENTERPRISE_GIT_PROJECT_PATH
    GES_URL: $ENTERPRISE_GES_URL
    KEYCLOAK_CLIENT_SECRET: $E2E_KEYCLOAK_CLIENT_SECRET
  before_script:
    - |
      source ./scripts/enterprise/test-local/enterprise.env
      export GES_URL
      export ALLOWED_GRAMAX_URLS
      export LICENSE_KEY
      export AUTH_METHOD
      export KEYCLOAK_SERVER_URL

      export E2E_KEYCLOAK_READER_MAIL
      export E2E_KEYCLOAK_REVIEWER_MAIL
      export E2E_KEYCLOAK_EDITOR_MAIL
      export E2E_KEYCLOAK_CATALOG_OWNER_MAIL
      export E2E_KEYCLOAK_WORKSPACE_OWNER_MAIL

    - echo '127.0.0.1 enterprise.gramax.local' >> /etc/hosts
    - ./scripts/enterprise/test-local/start-enterprise.sh &

.template.tests:
  interruptible: true
  stage: test
  image: gitlab.ics-it.ru:4567/ics/doc-reader/playwright:$USE_IMAGE_TAG
  tags:
    - kubernetes01-gramax-5ghz
  rules:
    - !reference [.rules, tests, base]
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - !reference [.rules, core]

  variables:
    CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
    KUBERNETES_MEMORY_REQUEST: "2Gi"
    KUBERNETES_CPU_REQUEST: "2"
    KUBERNETES_CPU_LIMIT: "5"
  before_script:
    - !reference [.template.github-ssh-key, before_script]
    - ./install-deps.sh --ci --node
  artifacts:
    reports:
      junit: junit.xml

.template.tests-enterprise:
  extends: .template.tests
  variables: !reference [.template.enterprise, variables]
  before_script:
    - !reference [.template.tests, before_script]
    - !reference [.template.enterprise, before_script]

.template.e2e-pw-enterprise:
  extends: .template.e2e-pw
  variables: !reference [.template.enterprise, variables]
  before_script:
    - !reference [.template.e2e-pw, before_script]
    - !reference [.template.enterprise, before_script]

################### JOBS ###################

tests-rust:
  stage: test
  interruptible: true
  tags:
    - shell-macos-arm64v8
  rules:
    - !reference [.rules, tests, base]
    - !reference [.rules, tests, rust]
  script:
    - ./gx make-icons
    - cargo test --all-targets -p spa --tests --manifest-path ./Cargo.toml
    - cargo test --all-targets -p gramax-git --tests --manifest-path ./Cargo.toml

biome:
  stage: test
  interruptible: true
  image: gitlab.ics-it.ru:4567/ics/doc-reader/base-image:$USE_IMAGE_TAG
  tags:
    - kubernetes01-gramax
  variables:
    GIT_DEPTH: 2
    KUBERNETES_MEMORY_REQUEST: "512Mi"
    KUBERNETES_CPU_REQUEST: "0.2"
    KUBERNETES_CPU_LIMIT: "3"
  rules:
    - if: '$CI_COMMIT_TITLE =~ /!?\[?(skip|no)[ -]biome\]?/i'
      when: never
    - !reference [.rules, tests, base]
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - !reference [.rules, core]
  before_script:
    - ./install-deps.sh --ci
    - |
      if [ -v CI_MERGE_REQUEST_TARGET_BRANCH_NAME ]; then
        target="${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}"
        git fetch --depth 1 origin "$target"
        git diff --name-only --diff-filter=ACMR origin/"$target" HEAD > .changed_files

        if [[ $(wc -l < .changed_files) -ge 50 ]]; then
          cat .changed_files
        fi
      fi
  script:
    - |
      if [ -f .changed_files ]; then
        bun run biome ci --no-errors-on-unmatched --error-on-warnings --files-ignore-unknown=true -- "$(cat .changed_files)"
      fi
    - bun run biome ci --diagnostic-level error
  after_script:
    - cat .changed_files

