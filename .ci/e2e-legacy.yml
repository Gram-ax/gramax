legacy-e2e:
  extends: .template.tests
  stage: test
  tags:
    - kubernetes01-gramax-5ghz
  image: gitlab.ics-it.ru:4567/ics/doc-reader/playwright:$USE_IMAGE_TAG
  rules:
    - !reference [.rules, tests, base]
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - !reference [.rules, core]
  variables:
    PORT: 5173
    PRODUCTION: 'false'
    GX_E2E_GITLAB_PUSH_REPO: test-push-$CI_COMMIT_SHORT_SHA
    KUBERNETES_MEMORY_REQUEST: '3Gi'
    KUBERNETES_CPU_REQUEST: '1.5'
    KUBERNETES_CPU_LIMIT: '4'
  before_script:
    - ./install-deps.sh --ci
  script:
    - nice -n 15 ionice -c 3 bun run --cwd apps/browser build
    - bun run --cwd apps/browser start &
    - nice -n -15 ionice -c 2 npm --prefix e2e run test

  after_script:
    - ./.ci/e2e/delete-repo.sh
  artifacts:
    when: always
    expire_in: 1 day
    paths:
      - e2e/report/
    reports:
      junit: e2e/junit*.xml
