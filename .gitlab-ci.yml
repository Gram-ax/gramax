stages:
  - renovate
  - build-images
  - test
  - build
  - build-dev
  - deploy-dev
  - sync

include:
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Jobs/Container-Scanning.gitlab-ci.yml
  - local: .ci/.templates.yml
  - local: .ci/tests.yml
  - local: .ci/e2e-legacy.yml
  - local: .ci/build.yml
  - local: .ci/build-dev.yml
  - local: .ci/build-apps.yml
  - local: .ci/sync.yml

